# 3proxy configuration for dongle transparent proxy
# Each dongle gets its own SOCKS5 port

# DNS settings - use KT DNS
nscache 65536
nserver 168.126.63.1
nserver 8.8.8.8

# Logging
log /home/proxy/network-monitor/logs/3proxy-%y%m%d.log D
rotate 30

# No authentication for internal use
auth none

# Timeouts
timeouts 1 5 30 60 180 1800 15 60

# Allow all connections
allow *

# Disable proxy detection
fakeresolve
noforce

# Dongle 11 - Port 10011
socks -p10011 -i192.168.11.100
flush

# Dongle 12 - Port 10012
socks -p10012 -i192.168.12.100 -e112.161.54.7
flush

# Dongle 13 - Port 10013
socks -p10013 -i192.168.13.100 -e112.161.54.7
flush

