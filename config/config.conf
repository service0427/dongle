# Network Monitor Configuration File
# 네트워크 모니터링 설정 파일

# 모니터링 주기 (초)
CHECK_INTERVAL=60

# 외부 IP 확인 URL
EXTERNAL_CHECK_URL="https://ipinfo.io/ip"

# 외부 모니터링 서버 (옵션)
# 외부에서 이 서버의 접근성을 확인할 서버 주소
# 예: EXTERNAL_MONITOR_SERVER="http://monitor.example.com/api/check"
EXTERNAL_MONITOR_SERVER=""

# 헬스체크 서버 포트
HEALTH_CHECK_PORT=8080

# 메인 인터페이스 메트릭 값 (낮을수록 우선순위 높음)
MAIN_INTERFACE_METRIC=100

# 동글 인터페이스 기본 메트릭 값
DONGLE_BASE_METRIC=200

# IP 할당 대기 시간 (초)
IP_WAIT_TIMEOUT=300

# 복구 시도 최대 횟수
MAX_RECOVERY_ATTEMPTS=3

# DNS 서버 목록 (복구 시 사용)
DNS_SERVERS="8.8.8.8 8.8.4.4 1.1.1.1"

# 로그 파일 최대 크기 (MB)
LOG_MAX_SIZE=100

# 로그 파일 보관 개수
LOG_ROTATE_COUNT=5

# 디버그 모드 (true/false)
DEBUG_MODE=false